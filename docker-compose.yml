# Music Ferry Docker Compose
#
# Usage:
#   docker compose --env-file .env.docker up -d --build
#   docker compose --env-file .env.docker logs -f web
#
# Notes:
# - Sync scheduling now runs inside the web app and is configurable in the UI.
# - Manual transfer is triggered from the web UI.
# - Host media paths are mounted with propagation so re-mounted headphones appear
#   in the container without restarting.

services:
  web:
    build:
      context: .
      args:
        INSTALL_PLAYWRIGHT: "false"
    container_name: music-ferry-web
    restart: unless-stopped
    ports:
      - "${MUSIC_FERRY_PORT:-4444}:4444"
    volumes:
      - type: bind
        source: ${MUSIC_FERRY_DATA:?Set MUSIC_FERRY_DATA to your host data dir}
        target: /home/ferry/.music-ferry
      - type: bind
        source: ${HOST_MEDIA_DIR:-/media}
        target: /media
        bind:
          propagation: rslave
      - type: bind
        source: ${HOST_RUN_MEDIA_DIR:-/run/media}
        target: /run/media
        bind:
          propagation: rslave
    environment:
      - TZ=${TZ:-UTC}
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:4444/api/v1/health', timeout=8).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 64m
    cpus: 0.5
